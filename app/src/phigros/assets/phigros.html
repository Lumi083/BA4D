  async function preprocessFrames() {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = async () => {
        const promises = [];
        for (let i = 0; i < TOTAL_FRAMES; i++) {
          const col = i % COLS;
          const row = Math.floor(i / COLS);
          const promise = createImageBitmap(
            img,
            col * FRAME_WIDTH,
            row * FRAME_HEIGHT,
            FRAME_WIDTH,
            FRAME_HEIGHT
          );
          promises.push(promise);
        }
        frames = await Promise.all(promises);
        isLoaded = true;
        resolve();
      };
      img.onerror = () => reject(new Error('Failed to load hit_fx sprite'));
      img.src = HIT_FX_BASE64;
    });
  }

  async function applyColorToFrames(colorStr) {
    if (!frames.length) return;
    
    const colorMatch = colorStr.match(/rgba?\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if (!colorMatch) {
      coloredFrames = frames;
      return;
    }
    
    const r = parseInt(colorMatch[1]);
    const g = parseInt(colorMatch[2]);
    const b = parseInt(colorMatch[3]);
    
    // 白色直接使用原始帧
    if (r === 255 && g === 255 && b === 255) {
      coloredFrames = frames;
      return;
    }
    
    // 创建临时 canvas 进行着色
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = FRAME_WIDTH;
    tempCanvas.height = FRAME_HEIGHT;
    const tempCtx = tempCanvas.getContext('2d', { alpha: true, willReadFrequently: false });
    
    const promises = [];
    for (let i = 0; i < frames.length; i++) {
      tempCtx.clearRect(0, 0, FRAME_WIDTH, FRAME_HEIGHT);
      
      // 绘制原始帧
      tempCtx.drawImage(frames[i], 0, 0);
      
      // 应用颜色（multiply 模式）
      tempCtx.globalCompositeOperation = 'multiply';
      tempCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
      tempCtx.fillRect(0, 0, FRAME_WIDTH, FRAME_HEIGHT);
      
      // 保留原始 alpha
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(frames[i], 0, 0);
      
      // 重置混合模式
      tempCtx.globalCompositeOperation = 'source-over';
      
      // 转为 ImageBitmap
      promises.push(createImageBitmap(tempCanvas));
    }
    
    coloredFrames = await Promise.all(promises);
    currentColor = colorStr;
  }

  class HitEffect {
    constructor(x, y, scale) {
      this.x = x;
      this.y = y;
      this.scale = scale;
      this.currentFrame = 0;
      this.lastFrameTime = performance.now();
      this.finished = false;
    }

    update(timestamp) {
      if (this.finished) return;

      const frameDuration = 1000 / BASE_FPS;
      if (timestamp - this.lastFrameTime >= frameDuration) {
        this.currentFrame++;
        this.lastFrameTime = timestamp;

        if (this.currentFrame >= TOTAL_FRAMES) {
          this.finished = true;
        }
      }
    }

    render(ctx) {
      if (this.finished || this.currentFrame >= TOTAL_FRAMES) return;
      if (!coloredFrames.length) return;

      const w = FRAME_WIDTH * this.scale;
      const h = FRAME_HEIGHT * this.scale;
      
      ctx.drawImage(
        coloredFrames[this.currentFrame],
        this.x - w / 2,
        this.y - h / 2,
        w,
        h
      );
    }
  }

  function animate(timestamp) {
    // 检查颜色是否变化
    if (currentColor !== cfg.color && isLoaded) {
      applyColorToFrames(cfg.color);
    }
    
    const elapsed = timestamp - lastFrameTime;
    const fpsLimit = clamp(Math.trunc(Number(cfg.fpsLimit) || 60), 15, 120);

    if (elapsed < (1000 / fpsLimit) - 1) {
      requestAnimationFrame(animate);
      return;
    }

    const deltaMs = Math.min(elapsed, 250);
    lastFrameTime = timestamp;

    effects = effects.filter(effect => {
      if (!effect.finished) {
        effect.update(timestamp);
        return true;
      }
      return false;
    });

    if (effects.length > 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const effect of effects) {
        effect.render(ctx);
      }
    }

    requestAnimationFrame(animate);
  }

  let lastHitTime = 0;
  const HIT_INTERVAL = 125; // 8 hits per second = 125ms interval
  const pointerStates = new Map(); // 跟踪每个触点的按下状态

  function handleClick(x, y, pointerId = 0) {
    if (!isLoaded) return;
    
    const now = performance.now();
    // 每个触点独立节流
    const lastTime = lastHitTime;
    if (now - lastTime < HIT_INTERVAL) return;
    
    lastHitTime = now;
    const scale = clamp(Number(cfg.scale) || 1.0, 0.5, 3.0);
    effects.push(new HitEffect(x, y, scale));
  }

  function sendWsSubscription() {
    if (ws && ws.readyState === 1) {
      const fpsLimit = clamp(Math.trunc(Number(cfg.fpsLimit) || 60), 15, 120);
      ws.send(new Uint8Array([0xA0, 0x01, fpsLimit]));
    }
  }

  function applyPointerFrame(buffer, source) {
    if (!buffer || buffer.byteLength < 14) return;
    const dv = new DataView(buffer);
    const type = dv.getUint8(0);
    const dpr = effectiveDpr();
    let pointerId = 0, localX = 0, localY = 0, pressed = false;

    if (type === 0x01) {
      localX = (dv.getInt32(1, true) / dpr) - displayOrigin.x;
      localY = (dv.getInt32(5, true) / dpr) - displayOrigin.y;
      pressed = dv.getUint8(13) !== 0;
    } else if (type === 0x02) {
      pointerId = dv.getInt32(1, true);
      localX = (dv.getInt32(5, true) / dpr) - displayOrigin.x;
      localY = (dv.getInt32(9, true) / dpr) - displayOrigin.y;
      pressed = dv.getUint8(13) !== 0;
    } else {
      return;
    }

    if (source === 'mira') usingMiraInput = true;

    // 管理按下状态
    let state = pointerStates.get(pointerId);
    
    if (pressed) {
      if (!state) {
        // 首次按下，创建状态并立即触发
        state = { x: localX, y: localY, timer: null };
        pointerStates.set(pointerId, state);
        handleClick(localX, localY, pointerId);
        
        // 启动定时器用于长按时持续触发
        state.timer = setInterval(() => {
          const s = pointerStates.get(pointerId);
          if (s) {
            handleClick(s.x, s.y, pointerId);
          }
        }, HIT_INTERVAL);
      } else {
        // 更新位置（移动时），定时器会使用新位置
        state.x = localX;
        state.y = localY;
      }
    } else {
      // 释放时清理定时器
      if (state && state.timer) {
        clearInterval(state.timer);
        pointerStates.delete(pointerId);
      }
    }
  }

  function connectFallbackWs() {
    if (usingMiraInput || ws) return;
    ws = new WebSocket(`ws://127.0.0.1:${cfg.port}`);
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => {
      sendWsSubscription();
      if (subInterval) clearInterval(subInterval);
      subInterval = setInterval(sendWsSubscription, 20000);
    };
    ws.onclose = () => { ws = null; if (!usingMiraInput) setTimeout(connectFallbackWs, 2000); };
    ws.onmessage = (e) => applyPointerFrame(e.data, 'ws');
  }

  window.addEventListener('message', (e) => {
    const d = e && e.data;
    if (d && typeof d === 'object' && d.type === '__MIRAAPI_INPUT__' && d.id === window.__MIRAAPI_ELEMENT_ID__ && (d.device === 'mouse' || d.device === 'touch')) {
      applyPointerFrame(d.payload, 'mira');
    }
  });

  window.addEventListener('beforeunload', () => {
    if (subInterval) clearInterval(subInterval);
    if (ws) { try { ws.close(); } catch (_) {} ws = null; }
    pointerStates.forEach(state => {
      if (state.timer) clearInterval(state.timer);
    });
    pointerStates.clear();
  });

  preprocessFrames().then(async () => {
    await applyColorToFrames(cfg.color);
    animate(performance.now());
    setTimeout(() => { if (!usingMiraInput) connectFallbackWs(); }, 800);
  }).catch(err => {
    console.error('Failed to load hit_fx:', err);
  });
})();
</script>
